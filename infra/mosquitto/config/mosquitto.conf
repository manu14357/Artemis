# Mosquitto MQTT broker configuration for ARTEMIS
# Deployed via docker-compose into eclipse-mosquitto:2.0

# -----------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------

# MQTT over TCP (used by hub and nodes)
listener 1883
protocol mqtt

# MQTT over WebSocket (used by dashboard real-time updates)
listener 9001
protocol websockets

# -----------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------

# Allow anonymous connections (development default).
# For production, set allow_anonymous false and configure a password file:
#   password_file /mosquitto/config/passwd
allow_anonymous true

# -----------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------

persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -----------------------------------------------------------------------
# Connection limits
# -----------------------------------------------------------------------

# Maximum simultaneous connections (per-listener)
max_connections 200

# Keep-alive maximum
max_keepalive 120

# Message size limit (bytes): 1 MB
message_size_limit 1048576
