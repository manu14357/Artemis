---
# infra/k8s/ingress.yaml
# NGINX Ingress with TLS termination via cert-manager.
#
# Pre-requisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
#
# DNS: point dashboard.artemis.local and api.artemis.local at the ingress IP.

# ── ClusterIssuer: Let's Encrypt staging (swap for prod when ready) ───────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@artemis.local   # CHANGE to your email
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ── Ingress resource ──────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artemis-ingress
  namespace: artemis
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # TLS cert via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    # WebSocket support for /ws endpoint
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.artemis.local
        - dashboard.artemis.local
      secretName: artemis-tls
  rules:
    # Hub REST API + WebSocket
    - host: api.artemis.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artemis-hub
                port:
                  number: 8080

    # Next.js dashboard
    - host: dashboard.artemis.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artemis-dashboard
                port:
                  number: 3000
