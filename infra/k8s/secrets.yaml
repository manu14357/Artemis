---
# infra/k8s/secrets.yaml
# Kubernetes Secret template for ARTEMIS credentials.
#
# !! DO NOT commit real secret values to source control !!
# Populate using kubectl or a secrets manager before deploying.
#
# Quick setup (replace values with base64-encoded strings):
#   echo -n 'your-key-here' | base64
#
# Or use a tool like Sealed Secrets / External Secrets Operator for GitOps.

apiVersion: v1
kind: Secret
metadata:
  name: artemis-api-keys
  namespace: artemis
  labels:
    app.kubernetes.io/part-of: artemis
type: Opaque
data:
  # base64-encoded comma-separated API keys
  # Decoded example: "key-prod-abc123,key-ops-xyz789"
  ARTEMIS_API_KEYS: ""   # FILL IN: echo -n 'key1,key2' | base64

---
apiVersion: v1
kind: Secret
metadata:
  name: artemis-mqtt-creds
  namespace: artemis
  labels:
    app.kubernetes.io/part-of: artemis
type: Opaque
data:
  # base64-encoded MQTT broker credentials
  ARTEMIS_MQTT_USER: ""  # FILL IN: echo -n 'artemis' | base64
  ARTEMIS_MQTT_PASS: ""  # FILL IN: echo -n 'changeme' | base64
