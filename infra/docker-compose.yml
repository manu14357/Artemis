version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: artemis-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - artemis-mosquitto-data:/mosquitto/data
      - artemis-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  hub:
    image: python:3.11-slim
    container_name: artemis-hub
    restart: unless-stopped
    working_dir: /app
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ../:/app
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      python hub/main.py --config hub/config/hub_default.yaml"
    environment:
      - PYTHONUNBUFFERED=1
      - ARTEMIS_MQTT_BROKER=mosquitto
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  dashboard:
    image: node:20-alpine
    container_name: artemis-dashboard
    restart: unless-stopped
    working_dir: /app/dashboard
    depends_on:
      hub:
        condition: service_healthy
    volumes:
      - ../dashboard:/app/dashboard
      - artemis-dashboard-node-modules:/app/dashboard/node_modules
    # Next.js 16 dev server: use `next dev` (not vite)
    command: >
      sh -c "npm ci && npx next dev --hostname 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_HUB_URL=http://hub:8080
      - NEXT_PUBLIC_HUB_WS_URL=ws://hub:8080/ws
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: artemis-prometheus
    restart: unless-stopped
    depends_on:
      - hub
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - artemis-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: artemis-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=artemis-grafana
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - artemis-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"

volumes:
  artemis-mosquitto-data:
  artemis-mosquitto-log:
  artemis-dashboard-node-modules:
  artemis-prometheus-data:
  artemis-grafana-data:
