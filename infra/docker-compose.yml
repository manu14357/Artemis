version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: artemis-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  hub:
    image: python:3.11-slim
    container_name: artemis-hub
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - mosquitto
    volumes:
      - ../:/app
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      python hub/main.py --config hub/config/hub_default.yaml"
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"

  dashboard:
    image: node:20-alpine
    container_name: artemis-dashboard
    restart: unless-stopped
    working_dir: /app/dashboard
    depends_on:
      - hub
    volumes:
      - ../dashboard:/app/dashboard
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
