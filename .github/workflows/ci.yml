name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('requirements.txt') }}

      - name: Install lint tools
        run: pip install ruff black==25.1.0

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check .

  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install test dependencies; skip packages that require hardware drivers
          pip install \
            numpy scipy scikit-learn \
            paho-mqtt \
            fastapi uvicorn[standard] aiofiles \
            pyyaml pydantic \
            prometheus-client structlog \
            slowapi python-jose[cryptography] \
            pytest pytest-asyncio httpx requests
          # Stub-install packages that need hardware so imports don't fail
          pip install pyrtlsdr || true
          pip install opencv-python-headless || true
          pip install sounddevice || true
          # Install artemis package in editable mode
          pip install -e .

      - name: Run unit + integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/unit tests/integration -q \
            --tb=short \
            -m "not hardware" \
            --ignore=tests/load

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
