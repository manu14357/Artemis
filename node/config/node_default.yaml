node:
  id: 'node-01'
  location:
    lat: 17.3850      # Replace with your node's GPS latitude
    lon: 78.4867      # Replace with your node's GPS longitude
    alt_m: 540        # Altitude in metres above sea level

sensors:
  rf:
    enabled: true
    frequencies:
      - 2437000000    # 2.4 GHz (Wi-Fi ch6 centre — covers most DJI/consumer drones)
      - 5780000000    # 5.8 GHz (video downlink)
      - 915000000     # 900 MHz (long-range FPV)
    fft_size: 1024
    threshold_db: -50
    # Tuning hint: run scripts/test_rf.py in your deployment environment and
    # raise the threshold until false positives from Wi-Fi drop to near zero.

  acoustic:
    enabled: true
    sample_rate: 16000    # Hz — 16 kHz is sufficient for drone rotor harmonics
    channels: 4           # Must match your microphone array channel count
    device_index: 0       # sounddevice device ID — run `python -m sounddevice` to list
    window_ms: 500        # STFT window length in milliseconds
    model_path: models/acoustic_drone_cnn.tflite
    confidence_threshold: 0.75

  radar:
    enabled: true
    # IMPORTANT: Use the UART serial port, NOT an SPI device path.
    # The XM125 connects via a USB-UART adapter appearing as /dev/ttyUSB0 or /dev/ttyACM0.
    serial_port: /dev/ttyUSB0
    start_point: 50
    num_points: 100
    step_length: 2
    profile: PROFILE_5

  optical:
    enabled: true
    resolution: [640, 480]
    fps: 30
    # Background subtractor learning rate (lower = slower adaptation to scene changes)
    mog2_learning_rate: 0.005
    # Minimum blob area in pixels to consider as a detection candidate
    min_blob_area: 80

mqtt:
  broker: 192.168.1.100   # IP address of the hub machine
  port: 1883
  keepalive: 60
  # Set username/password if your Mosquitto broker has auth enabled:
  # username: artemis
  # password: changeme

effectors:
  # All effectors are SIMULATION ONLY by default.
  # Set enabled: true only if you have explicit legal authorisation.
  gpio_relay:
    enabled: false
    pins: [17, 27, 22, 23]
  rf_jammer:
    enabled: false   # ILLEGAL without licence — simulation only
  gps_spoofer:
    enabled: false   # ILLEGAL — simulation only

logging:
  level: INFO        # DEBUG | INFO | WARNING | ERROR
  file: logs/artemis-node.log
  rotate_mb: 50
  keep_backups: 5
